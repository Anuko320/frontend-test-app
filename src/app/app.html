<div class="theme-toggle-wrap">
  <app-theme-toggle />

  <app-language-toggle />

  @if (authService.isAuthenticated()) {
    <button
      type="button"
      class="btn btn-secondary"
      (click)="logout()"
    >
      {{ languageService.language() === 'en'
        ? 'Logout'
        : 'Выйти'
      }}
    </button>
  }
</div>

<router-outlet />
